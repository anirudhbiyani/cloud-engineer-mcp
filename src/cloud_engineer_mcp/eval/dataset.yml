# ---- GitHub remote ----
- query: "List PRs on my repo"
  expected:
    - gh_remote__list_pull_requests
    - ado_main__list_pull_requests

- query: "Open a GitHub pull request"
  expected: gh_remote__create_pull_request

- query: "Trigger a GitHub Actions workflow"
  expected: gh_remote__run_workflow

# ---- Documentation lookups ----
- query: "Search Microsoft Azure documentation"
  expected: mslearn__search_docs

- query: "Look up AWS documentation"
  expected: aws_kb__search_docs

# ---- GCP managed remote MCPs ----
- query: "Run a BigQuery query via the managed endpoint"
  expected:
    - gcp_rem_bq__run_query
    - gcp__run_bigquery_query

- query: "List GKE clusters using the managed remote API"
  expected:
    - gcp_rem_gke__list_clusters
    - gcp__list_gke_clusters

- query: "Tail logs from Cloud Logging"
  expected: gcp_rem_logging__query_logs
