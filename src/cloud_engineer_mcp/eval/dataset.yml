# ---- Azure DevOps ----
- query: "List PRs in my Azure DevOps repo"
  expected: ado_main__list_pull_requests

- query: "Open a new pull request in ADO"
  expected: ado_main__create_pull_request

- query: "Run my Azure DevOps pipeline"
  expected: ado_main__run_pipeline

