name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.1.0). Leave blank to use the latest tag."
        required: false

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv build
      - id: meta
        run: |
          echo "version=$(find dist -name '*.whl' | head -n1 | sed -E 's|.*-([0-9][^-]+)-py3.*|\1|')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cloud-engineer-mcp/${{ needs.build.outputs.version }}
    permissions:
      id-token: write  # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted Publisher: set up on PyPI as
          # https://pypi.org/manage/account/publishing/ with environment=pypi
          # and this repo selected. No API token needed.
          attestations: true

  docker:
    name: Build & push Docker (multi-arch)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # to push to ghcr.io
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    needs: [pypi-publish, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Generate release notes
        id: notes
        run: |
          # Extract the section under [Unreleased] from CHANGELOG.md as a
          # baseline. Maintainers can edit the release on GitHub afterwards.
          awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            echo "No release notes found in CHANGELOG.md under [Unreleased]." > /tmp/notes.md
          fi
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: /tmp/notes.md
          generate_release_notes: true
