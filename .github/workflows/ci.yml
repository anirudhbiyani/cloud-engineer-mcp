name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Install
        run: uv sync --extra dev
      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short
      - name: Integration tests
        run: uv run pytest tests/integration/ -v --tb=short --timeout=60

      - name: Selector eval gate (keyword mode)
        # Fast eval that doesn't pull the 80MB embedding model. Catches
        # regressions in the context extractor, structured-intent weighting,
        # and tool index without slowing CI.
        run: uv run cloud-engineer-mcp eval --keyword-only --threshold 0.80

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
